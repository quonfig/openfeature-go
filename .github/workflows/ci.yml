name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout openfeature-go
        uses: actions/checkout@v4
        with:
          path: openfeature-go

      - name: Checkout integration-test-data
        uses: actions/checkout@v4
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: openfeature-go/go.sum

      - name: Check formatting
        working-directory: openfeature-go
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "Files need gofmt:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        working-directory: openfeature-go
        run: go vet ./...

      - name: Test
        working-directory: openfeature-go
        run: go test -v -race ./...
